name: CMS Prod - Testes Automatizados

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Spec para rodar (deixe vazio para rodar todos)'
        required: false
        default: 'cypress/e2e/**/*.cy.js'

jobs:
  cypress-run:
    name: Executar Testes Cypress
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: ${{ github.event.inputs.spec }}
        env:
          CYPRESS_PRODUCAO_URL:     ${{ secrets.CYPRESS_PRODUCAO_URL }}
          CYPRESS_EMAIL_PRODUCAO:   ${{ secrets.CYPRESS_EMAIL_PRODUCAO }}
          CYPRESS_SENHA_PRODUCAO:   ${{ secrets.CYPRESS_SENHA_PRODUCAO }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Publicar screenshots no Job Summary
        if: always()
        run: |
          echo "## 📸 Screenshots dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if find cypress/screenshots -name "*.png" | grep -q .; then
            find cypress/screenshots -name "*.png" | sort | while read img; do
              name=$(basename "$img" .png)
              folder=$(dirname "$img" | sed 's|cypress/screenshots/||')
              b64=$(base64 -w 0 "$img")

              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>📷 <strong>$folder / $name</strong></summary>" >> $GITHUB_STEP_SUMMARY
              echo "<br>" >> $GITHUB_STEP_SUMMARY
              echo "<img src='data:image/png;base64,$b64' width='1200'>" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "Nenhum screenshot encontrado." >> $GITHUB_STEP_SUMMARY
          fi
